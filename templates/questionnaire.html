<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>วิเคราะห์ความเสี่ยงมะเร็งผิวหนัง (AI)</title>

  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Prompt', sans-serif;
      background: #f4f9ff;
      padding: 40px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      color: #0a66c2;
      margin-bottom: 25px;
    }

    .question {
      margin-bottom: 18px;
    }

    label {
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background: #0a66c2;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #eef6ff;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      color: #0a66c2;
    }

    .back-btn{
    display:inline-block;
    margin-top:30px;
    padding:12px 24px;
    background:#0a66c2;
    color:white;
    text-decoration:none;
    border-radius:30px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>วิเคราะห์ภาพผิวหนังด้วย AI</h2>

  <form method="POST" enctype="multipart/form-data">

    <div class="question">
      <label>อัปโหลดภาพผิวหนัง</label>
      <input type="file" name="image" accept="image/*" required>
    </div>

    <button type="submit">วิเคราะห์ด้วย AI</button>

  </form>

  {% if result %}
  <div class="result">
    {{ result|safe }}
  </div>
  {% endif %}

  <div class="container">

    

    <a href="/" class="back-btn">
        กลับหน้าแรก
    </a>

  </div>

</div>

</body>
</html>
