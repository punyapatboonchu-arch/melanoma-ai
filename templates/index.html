<!DOCTYPE html>
<html>
<head>
    <title>Melanoma AI</title>
</head>
<body>

<h2>ระบบวิเคราะห์ความเสี่ยงมะเร็งผิวหนัง</h2>

<form method="POST" enctype="multipart/form-data">

    <p>อัปโหลดรูป:</p>
    <input type="file" name="image" required><br><br>

    <p>โดนแดดบ่อยไหม:</p>
    <select name="sun">
        <option value="yes">ใช่</option>
        <option value="no">ไม่</option>
    </select><br><br>

    <p>สีผิว:</p>
    <select name="skin">
        <option value="fair">ขาว</option>
        <option value="dark">เข้ม</option>
    </select><br><br>

    <p>มีประวัติครอบครัว:</p>
    <select name="family">
        <option value="yes">ใช่</option>
        <option value="no">ไม่</option>
    </select><br><br>

    <button type="submit">วิเคราะห์</button>

</form>

{% if result %}
    <h3>{{ result }}</h3>
{% endif %}

</body>
</html>
