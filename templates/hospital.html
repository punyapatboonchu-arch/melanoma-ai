  const regionSelect = document.getElementById('region');
  const provinceSelect = document.getElementById('province');
  const hospitalSelect = document.getElementById('hospital');
  const hospitalDetails = document.getElementById('hospitalDetails');

  // สร้างตัวเลือกภาค
  const regions = [...new Set(hospitals.map(h => h.ภูมิภาค))];
  regions.forEach(r => {
    const option = document.createElement('option');
    option.value = r;
    option.textContent = r;
    regionSelect.appendChild(option);
  });

  regionSelect.addEventListener('change', () => {
    provinceSelect.innerHTML = '<option value="">-- เลือกจังหวัด --</option>';
    hospitalSelect.innerHTML = '<option value="">-- เลือกรพ. --</option>';
    hospitalDetails.innerHTML = 'กรุณาเลือกโรงพยาบาล';

    const selectedRegion = regionSelect.value;
    const provinces = [...new Set(hospitals.filter(h => h.ภูมิภาค === selectedRegion).map(h => h.จังหวัด))];

    provinces.forEach(p => {
      const option = document.createElement('option');
      option.value = p;
      option.textContent = p;
      provinceSelect.appendChild(option);
    });
  });

  provinceSelect.addEventListener('change', () => {
    hospitalSelect.innerHTML = '<option value="">-- เลือกรพ. --</option>';
    hospitalDetails.innerHTML = 'กรุณาเลือกโรงพยาบาล';

    const selectedProvince = provinceSelect.value;
    const filteredHospitals = hospitals.filter(h => h.จังหวัด === selectedProvince);

    filteredHospitals.forEach(h => {
      const option = document.createElement('option');
      option.value = h['ชื่อโรงพยาบาล'];
      option.textContent = h['ชื่อโรงพยาบาล'];
      hospitalSelect.appendChild(option);
    });
  });

  hospitalSelect.addEventListener('change', () => {
    const selectedHospital = hospitals.find(h => h['ชื่อโรงพยาบาล'] === hospitalSelect.value);

    if(selectedHospital) {
      hospitalDetails.innerHTML = `
        <p><strong>ที่อยู่:</strong> ${selectedHospital.ที่อยู่}</p>
        <p><strong>เวลาเปิด-ปิดคลินิกผิวหนัง:</strong> ${selectedHospital['วันและเวลาเปิด-ปิดคลินิกผิวหนัง']}</p>
        <p><strong>เวลาเปิด-ปิดคลินิกผิวหนัง (พิเศษ):</strong> ${selectedHospital['วันและเวลาเปิด-ปิดคลินิกผิวหนัง(พิเศษ)']}</p>
        <p><strong>เบอร์โทรศัพท์:</strong> ${selectedHospital['เบอร์โทรศัพท์']}</p>
        <p><a href="${selectedHospital['ลิงค์ที่อยู่(GOOGLEMAP)']}" target="_blank">ดูแผนที่</a></p>
      `;
    }
  });
